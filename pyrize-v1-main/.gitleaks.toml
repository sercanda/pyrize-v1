title = "Pyrize Secret Scan"

[extend]
path = ""

[entries]
  [[entries.allowlist]]
  description = "Ignore lockfiles and node modules"
  paths = [
    "package-lock.json",
    "pnpm-lock.yaml",
    "yarn.lock",
    "node_modules/"
  ]

[[rules]]
description = "Generic API key"
regex = '''(?i)(api[-_]?key|secret|token|password)\s*[:=]\s*['"][A-Za-z0-9_\-]{20,}['"]'''
tags = ["key", "secret", "generic"]

[[rules]]
description = "Bearer token"
regex = '''Bearer\s+[A-Za-z0-9-_]+\.[A-Za-z0-9-_]+\.[A-Za-z0-9-_]+'''
tags = ["token", "jwt"]

