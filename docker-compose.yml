version: "3.8"

services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_APP_URL=https://pyrize.com
      - GOTENBERG_URL=http://gotenberg:3000
      - PDF_RATE_LIMIT=3
      - PDF_RATE_WINDOW_SECONDS=60
      - PDF_CONCURRENCY=2
      - PDF_QUEUE_LIMIT=20
    depends_on:
      gotenberg:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - pyrize-network
    restart: unless-stopped

  gotenberg:
    image: gotenberg/gotenberg:8
    command:
      - "gotenberg"
      - "--chromium-disable-javascript=false"
      - "--api-timeout=60s"
      - "--chromium-max-queue-size=10"
      - "--log-level=info"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - pyrize-network
    restart: unless-stopped

networks:
  pyrize-network:
    driver: bridge
